<!-- templates/admin_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Muhammad Aqib Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #00000f 0%, #0a0a0f 100%);
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-cyan-500 rounded-full blur-[120px] opacity-10 animate-pulse"></div>
    </div>
    
    <div class="relative z-10 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="font-['Orbitron'] text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-600 bg-clip-text text-transparent">ADMIN PORTAL</div>
            <p class="text-white/50 text-sm mt-2">Secure access only</p>
        </div>
        
        <div class="backdrop-blur-xl bg-white/5 border border-white/10 rounded-2xl p-8 shadow-2xl">
            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-full flex items-center justify-center">
                    <i class="fas fa-lock text-3xl text-white"></i>
                </div>
            </div>
            
            <form method="POST">
                <div class="mb-5">
                    <label class="block text-white/80 text-sm font-semibold mb-2"><i class="fas fa-user mr-2 text-cyan-400"></i> Username</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:border-cyan-400 focus:outline-none transition-all text-white placeholder-white/30" placeholder="Enter username">
                </div>
                <div class="mb-6">
                    <label class="block text-white/80 text-sm font-semibold mb-2"><i class="fas fa-key mr-2 text-cyan-400"></i> Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:border-cyan-400 focus:outline-none transition-all text-white placeholder-white/30" placeholder="Enter password">
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-xl font-bold text-white shadow-lg shadow-cyan-500/30 hover:translate-y-[-2px] transition-all">
                    <i class="fas fa-sign-in-alt mr-2"></i> Login
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="{{ url_for('index') }}" class="text-white/40 text-sm hover:text-cyan-400 transition-all"><i class="fas fa-arrow-left mr-1"></i> Back to Portfolio</a>
            </div>
        </div>
        
        <div class="text-center mt-6 text-white/30 text-xs">
            <i class="fas fa-shield-alt mr-1"></i> Demo credentials: admin / admin123
        </div>
    </div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="fixed bottom-4 right-4 z-50">
                {% for category, message in messages %}
                    <div class="p-4 rounded-xl backdrop-blur-lg border {% if category == 'success' %}bg-green-500/20 border-green-500/50 text-green-300{% else %}bg-red-500/20 border-red-500/50 text-red-300{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    
    <script>
        setTimeout(() => {
            const flash = document.querySelector('.fixed.bottom-4');
            if (flash) flash.style.display = 'none';
        }, 4000);
    </script>
</body>
</html>
